<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VINTAGEc | Venture Collective</title>
    <style>
        /* Container and base styles */
        .site-container {
            margin: 0;
            padding: 0;
            font-family: "Times New Roman", Times, serif;
            background-color: #fff;
            color: #000;
            overflow-x: hidden;
        }

        /* --- Navigation --- */
        .nav-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2.5rem 4rem;
            position: fixed; /* Fixed to stay above the scrolling video */
            top: 0;
            width: 100%;
            box-sizing: border-box;
            z-index: 100;
        }

        .brand-logo {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: none; /* Matches "VINTAGEc" case */
        }

        .nav-right-group {
            display: flex;
            align-items: center;
            gap: 3rem;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: #000;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: Arial, sans-serif;
            font-weight: 500;
        }

        .email-icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
        }

        .mobile-toggle {
            display: none;
            cursor: pointer;
            font-size: 1.5rem;
        }

        /* --- Hero Section --- */
        .hero-section {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 4rem;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* The Video Background */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: #fff; /* Fallback */
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Applying a slight fade to match the clean white aesthetic */
            opacity: 0.15; 
            filter: grayscale(100%);
        }

        .hero-main-content {
            max-width: 1100px;
            margin-top: 5rem;
        }

        .est-label {
            font-family: Arial, sans-serif;
            font-size: 0.7rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            opacity: 0.8;
        }

        .hero-headline {
            font-size: clamp(3.5rem, 12vw, 9.5rem);
            line-height: 0.82;
            margin: 0;
            font-weight: 400;
            letter-spacing: -3px;
        }

        .hero-sub-footer {
            display: flex;
            justify-content: flex-end;
            margin-top: 3rem;
        }

        .hero-text-block {
            max-width: 280px;
            font-size: 0.85rem;
            line-height: 1.5;
            text-align: right;
            font-family: Arial, sans-serif;
            font-weight: 400;
        }

        /* --- Mobile Responsiveness --- */
        @media (max-width: 992px) {
            .nav-links { display: none; } /* Simplified for demo, can be a toggle menu */
            .mobile-toggle { display: block; }
            .nav-section { padding: 1.5rem 2rem; }
            .hero-section { padding: 0 2rem; }
            .hero-sub-footer { justify-content: flex-start; }
            .hero-text-block { text-align: left; }
        }
    </style>
</head>
<body>

<div class="site-container">
    <nav class="nav-section">
        <div class="brand-logo">VINTAGEc</div>
        
        <div class="nav-right-group">
            <ul class="nav-links" id="menu">
                <li><a href="#">Portfolio</a></li>
                <li><a href="#">Team</a></li>
                <li><a href="#">Talent</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
            
            <a href="mailto:info@vintagec.com" class="email-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
            </a>

            <div class="mobile-toggle" onclick="toggleMobileMenu()">☰</div>
        </div>
    </nav>

    <section class="hero-section">
        <div class="video-container">
            <video autoplay muted loop playsinline>
                <source src="assest/Vintage.mp4" type="video/mp4">
            </video>
        </div>

        <div class="hero-main-content">
            <div class="est-label">Established MMXXIII</div>
            <h1 class="hero-headline">Investing in the<br>unseen future.</h1>
        </div>

        <div class="hero-sub-footer">
            <p class="hero-text-block">
                VINTAGEc is a venture collective dedicated to the architects of the next paradigm. We move in the shadows of the obvious.
            </p>
        </div>
    </section>
</div>

<script>
    function toggleMobileMenu() {
        const menu = document.getElementById('menu');
        if (menu.style.display === 'flex') {
            menu.style.display = 'none';
        } else {
            menu.style.display = 'flex';
            menu.style.flexDirection = 'column';
            menu.style.position = 'absolute';
            menu.style.top = '60px';
            menu.style.right = '2rem';
            menu.style.background = '#fff';
            menu.style.padding = '1rem';
        }
    }
</script>

</body>
</html>
